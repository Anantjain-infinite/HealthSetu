version: '3.9'

# ─────────────────────────────────────────────────────────────────
# HealthSetu — Rural Telemedicine Platform
# Docker Compose configuration for local development and production
# ─────────────────────────────────────────────────────────────────

services:
  # ── PostgreSQL database ──────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-telemedicine}
      POSTGRES_USER:     ${POSTGRES_USER:-telemed_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # IMPORTANT: Do NOT expose port 5432 to the host in production.
    # Only expose during local development for debugging with psql/pgAdmin.
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-telemed_user} -d ${POSTGRES_DB:-telemedicine}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal

  # ── Express + Socket.io backend ──────────────────────────────────
  backend:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV:               ${NODE_ENV:-production}
      PORT:                   ${PORT:-5000}
      DATABASE_URL:           postgresql://${POSTGRES_USER:-telemed_user}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-telemedicine}
      JWT_ACCESS_SECRET:      ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET:     ${JWT_REFRESH_SECRET}
      TWILIO_ACCOUNT_SID:     ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN:      ${TWILIO_AUTH_TOKEN}
      TWILIO_FROM_NUMBER:     ${TWILIO_FROM_NUMBER}
      AWS_ACCESS_KEY_ID:      ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY:  ${AWS_SECRET_ACCESS_KEY}
      AWS_BUCKET_NAME:        ${AWS_BUCKET_NAME}
      AWS_REGION:             ${AWS_REGION:-ap-south-1}
      FRONTEND_URL:           ${FRONTEND_URL:-https://localhost}
      TURN_URL:               ${TURN_URL:-}
      TURN_USERNAME:          ${TURN_USERNAME:-}
      TURN_CREDENTIAL:        ${TURN_CREDENTIAL:-}
    volumes:
      # Mount Winston log output so logs persist outside the container
      - ./logs:/app/logs
    networks:
      - internal
    # Do NOT expose port 5000 to the host — Nginx proxies it internally
    # ports:
    #   - "5000:5000"

  # ── React + Vite frontend (built static files served by Nginx) ───
  frontend:
    build:
      context: ./packages/frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL:    ${VITE_API_URL:-/api/v1}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL:-/}
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - internal

  # ── Nginx reverse proxy (HTTPS termination + static file serving) ─
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

# ── Volumes ──────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local

# ── Networks ──────────────────────────────────────────────────────────
networks:
  internal:
    driver: bridge
